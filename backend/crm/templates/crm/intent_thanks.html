<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desi Firms</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #fff; border-radius: 16px; padding: 40px; max-width: 400px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        .logo { font-size: 24px; font-weight: 800; color: #0093E9; margin-bottom: 20px; }
        .error { color: #ef4444; font-size: 16px; }
        a { color: #0093E9; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">DESI FIRMS</div>
        {% if error %}
            <p class="error">{{ error }}</p>
            <p><a href="https://www.desifirms.com.au">Go to Desi Firms</a></p>
        {% endif %}
    </div>
</body>
</html>
